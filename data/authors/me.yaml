bio: "Melgris José Becerra Ruiz is a Geographer and Environmental Scientist with a PhD from the Federal University of Pará (Brazil). His research integrates GIS, participatory cartography, and socio-environmental analysis to study indigenous territories, climate change vulnerability, and sustainability in Amazonian and coastal Latin America. He coordinates CLACSO's Working Group on Critical Latin American Geographic Thought and has published in journals including Geography and Sustainability, Sustainability, and Climate (115+ citations, h-index: 5).\n"
